version: "3.9"

# Docker Compose конфигурация для проекта "Банк лекций"
# Включает: PostgreSQL база данных + FastAPI бэкенд

services:
  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: lecturebank_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lecturebank_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lecturebank_password}
      POSTGRES_DB: ${POSTGRES_DB:-lecturebank_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lecturebank_user} -d ${POSTGRES_DB:-lecturebank_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI бэкенд
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lecturebank_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lecturebank_user}:${POSTGRES_PASSWORD:-lecturebank_password}@db:5432/${POSTGRES_DB:-lecturebank_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Том для данных PostgreSQL
  postgres_data:
    driver: local
  # Том для загруженных файлов лекций
  uploads_data:
    driver: local
